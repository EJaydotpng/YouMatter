<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block head_title %}{% endblock %} - Mental Health Support Terminal</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --terminal-bg: #161b22;
            --border-color: #30363d;
            --accent-blue: #58a6ff;
            --soft-text: #c9d1d9;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--soft-text); 
            font-family: 'Segoe UI', 'Roboto Mono', monospace; 
            display: flex; 
            align-items: center;
            justify-content: center;
            height: 100vh; 
            margin: 0;
        }

        .login-box {
            background: var(--terminal-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .login-box h1 {
            color: #fff;
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .login-box p {
            color: #8b949e;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .google-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            color: #3c4043;
            border: 1px solid #dadce0;
            border-radius: 4px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            transition: background-color 0.2s, box-shadow 0.2s;
        }

        .google-btn:hover {
            background: #f8f9fa;
            box-shadow: 0 1px 3px rgba(60,64,67,0.3);
        }

        .google-icon {
            width: 18px;
            height: 18px;
            margin-right: 12px;
        }

        .divider {
            margin: 25px 0;
            border-top: 1px solid var(--border-color);
            position: relative;
        }

        .divider span {
            background: var(--terminal-bg);
            padding: 0 10px;
            color: #8b949e;
            font-size: 12px;
            position: absolute;
            top: -9px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Form specific styles */
        .login-box form {
            text-align: left;
        }

        .login-box form p {
            margin-bottom: 20px;
        }

        .login-box form label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #8b949e;
            font-weight: 500;
        }

        .login-box form input[type="text"],
        .login-box form input[type="email"],
        .login-box form input[type="password"] {
            width: 100%;
            padding: 12px;
            background: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--soft-text);
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .login-box form input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }

        .login-box form button[type="submit"],
        .login-box .primaryAction {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        .login-box form button[type="submit"]:hover,
        .login-box .primaryAction:hover {
            background: #4285f4;
        }

        .login-box form input[type="checkbox"] {
            margin-right: 8px;
            accent-color: var(--accent-blue);
        }

        .login-box form ul.helptext, 
        .login-box form span.helptext {
            display: block;
            font-size: 11px;
            color: #8b949e;
            margin-top: 5px;
            list-style: none;
            padding-left: 0;
        }

        .login-box a {
            color: var(--accent-blue);
            text-decoration: none;
            font-size: 14px;
            margin-top: 15px;
            display: block;
        }

        .login-box a:hover {
            text-decoration: underline;
        }

        .errorlist {
            list-style: none;
            padding: 0;
            margin: -10px 0 10px 0;
            color: var(--danger-color);
            font-size: 13px;
            text-align: left;
        }
        .errorlist li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h1>YouMatter</h1>
    <p>{% block tagline %}Sign in to access your secure chat space{% endblock %}</p>

    {% block content %}{% endblock %}

    <div class="divider"><span>Security Notice</span></div>
    <p style="font-size: 11px; margin-bottom: 0;">Your mental health history is strictly bound to your account.</p>
</div>

</body>
</html>
