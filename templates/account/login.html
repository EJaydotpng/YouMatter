<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mental Health Support Terminal</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --terminal-bg: #161b22;
            --border-color: #30363d;
            --accent-blue: #58a6ff;
            --soft-text: #c9d1d9;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--soft-text); 
            font-family: 'Segoe UI', 'Roboto Mono', monospace; 
            display: flex; 
            align-items: center;
            justify-content: center;
            height: 100vh; 
            margin: 0;
        }

        .login-box {
            background: var(--terminal-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .login-box h1 {
            color: #fff;
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .login-box p {
            color: #8b949e;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .google-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            color: #3c4043;
            border: 1px solid #dadce0;
            border-radius: 4px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            transition: background-color 0.2s, box-shadow 0.2s;
        }

        .google-btn:hover {
            background: #f8f9fa;
            box-shadow: 0 1px 3px rgba(60,64,67,0.3);
        }

        .google-icon {
            width: 18px;
            height: 18px;
            margin-right: 12px;
        }

        .divider {
            margin: 25px 0;
            border-top: 1px solid var(--border-color);
            position: relative;
        }

        .divider span {
            background: var(--terminal-bg);
            padding: 0 10px;
            color: #8b949e;
            font-size: 12px;
            position: absolute;
            top: -9px;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>

<div class="login-box">
    <h1>YouMatter</h1>
    <p>Sign in to access your secure chat space</p>

    <!-- Load allauth tags -->
    {% load socialaccount %}
    
    <!-- Link to initialize Google OAuth login -->
    <a href="{% provider_login_url 'google' %}" class="google-btn">
        <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Sign in with Google
    </a>

    <div class="divider"><span>Security Notice</span></div>
    <p style="font-size: 11px; margin-bottom: 0;">Your mental health history is strictly bound to your account.</p>
</div>

</body>
</html>
